
<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>EMDR PWA</title>
</head>
<body>
  <div id="info"></div>
  <div id="dot"></div>
  <div id="controls">
    <label>Hastighet: <input type="range" id="speed" min="1" max="20" value="5"></label>
    <label>Størrelse: <input type="range" id="size" min="10" max="100" value="30"></label>
    <label>Intensitet: <input type="range" id="intensity" min="0.1" max="1" step="0.1" value="1"></label>
    <label>Tid (min): <input type="number" id="duration" min="1" max="60" value="5"></label>
    <button onclick="startSession()">Start</button>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
